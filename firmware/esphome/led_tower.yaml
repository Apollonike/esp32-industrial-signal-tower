esphome:
  name: led-tower-01
  friendly_name: LED Tower 01

  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(last_heartbeat_ms) = millis();
      - script.execute: apply_mode

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  use_address: led-tower-01.geier.solutions
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Led-Tower-01 Fallback Hotspot"
    password: !secret wifi_ap_password

captive_portal:

output:
  - platform: gpio
    pin: GPIO10
    id: led_red

  - platform: gpio
    pin: GPIO21
    id: led_yellow

  - platform: gpio
    pin: GPIO20
    id: led_green

globals:
  - id: mode_code
    type: int
    restore_value: yes
    initial_value: '0'   # 0=Off, 1=Normal, 2=Warning, 3=WarningBlink, 4=Alarm, 5=AlarmBlinkSlow, 6=AlarmBlinkFast

  - id: heartbeat_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: heartbeat_fault_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: last_heartbeat_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: blink_enabled
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: blink_fast
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: blink_state
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: heartbeat_cycle_step
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: all_off
    then:
      - output.turn_off: led_red
      - output.turn_off: led_yellow
      - output.turn_off: led_green

  - id: apply_mode
    then:
      - script.execute: all_off

      - lambda: |-
          id(blink_enabled) = false;
          id(blink_fast) = false;
          id(blink_state) = false;
          id(heartbeat_cycle_step) = 0;

          if (id(heartbeat_fault_active)) {
            return;
          }

          switch (id(mode_code)) {
            case 0:  // Off
              break;

            case 1:  // Normal
              id(led_green).turn_on();
              break;

            case 2:  // Warning
              id(led_yellow).turn_on();
              break;

            case 3:  // Warning Blink
              id(blink_enabled) = true;
              id(blink_fast) = false;
              break;

            case 4:  // Alarm
              id(led_red).turn_on();
              break;

            case 5:  // Alarm Blink Slow
              id(blink_enabled) = true;
              id(blink_fast) = false;
              break;

            case 6:  // Alarm Blink Fast
              id(blink_enabled) = true;
              id(blink_fast) = true;
              break;
          }

select:
  - platform: template
    name: "Tower Status"
    id: tower_status
    optimistic: true
    restore_value: true
    initial_option: "Off"
    options:
      - "Off"
      - "Normal"
      - "Warning"
      - "Warning Blink"
      - "Alarm"
      - "Alarm Blink Slow"
      - "Alarm Blink Fast"
    set_action:
      - lambda: |-
          if (x == "Off") id(mode_code) = 0;
          else if (x == "Normal") id(mode_code) = 1;
          else if (x == "Warning") id(mode_code) = 2;
          else if (x == "Warning Blink") id(mode_code) = 3;
          else if (x == "Alarm") id(mode_code) = 4;
          else if (x == "Alarm Blink Slow") id(mode_code) = 5;
          else if (x == "Alarm Blink Fast") id(mode_code) = 6;
      - script.execute: apply_mode

switch:
  - platform: template
    name: "Heartbeat Supervision"
    id: heartbeat_supervision
    lambda: |-
      return id(heartbeat_enabled);
    turn_on_action:
      - lambda: |-
          id(heartbeat_enabled) = true;
          id(last_heartbeat_ms) = millis();

          if (id(heartbeat_fault_active)) {
            id(heartbeat_fault_active) = false;
            id(mode_code) = 0;
            id(apply_mode).execute();
          }
    turn_off_action:
      - lambda: |-
          id(heartbeat_enabled) = false;

          if (id(heartbeat_fault_active)) {
            id(heartbeat_fault_active) = false;
            id(mode_code) = 0;
            id(apply_mode).execute();
          }

button:
  - platform: template
    name: "Heartbeat Ping"
    id: heartbeat_ping
    on_press:
      - lambda: |-
          id(last_heartbeat_ms) = millis();

          if (id(heartbeat_fault_active)) {
            id(heartbeat_fault_active) = false;
            id(mode_code) = 0;
            id(apply_mode).execute();
          }

interval:
  - interval: 250ms
    then:
      - lambda: |-
          // Heartbeat timeout check
          if (id(heartbeat_enabled) &&
              ((uint32_t)(millis() - id(last_heartbeat_ms)) > 15000)) {
            if (!id(heartbeat_fault_active)) {
              id(heartbeat_fault_active) = true;
              id(apply_mode).execute();
              return;
            }
          }

          // Heartbeat lost pattern:
          // all LEDs on for 0.5s every 3s
          if (id(heartbeat_fault_active)) {
            id(heartbeat_cycle_step)++;

            // 12 steps * 250ms = 3s cycle
            if (id(heartbeat_cycle_step) > 12) {
              id(heartbeat_cycle_step) = 1;
            }

            if (id(heartbeat_cycle_step) <= 2) {
              id(led_red).turn_on();
              id(led_yellow).turn_on();
              id(led_green).turn_on();
            } else {
              id(led_red).turn_off();
              id(led_yellow).turn_off();
              id(led_green).turn_off();
            }
            return;
          }

          // Normal blink handling
          if (!id(blink_enabled)) {
            return;
          }

          // Slow blink: toggle every 500ms (2 * 250ms)
          // Fast blink: toggle every 250ms
          static uint8_t slow_div = 0;

          if (id(blink_fast)) {
            id(blink_state) = !id(blink_state);
          } else {
            slow_div++;
            if (slow_div < 2) {
              return;
            }
            slow_div = 0;
            id(blink_state) = !id(blink_state);
          }

          id(led_red).turn_off();
          id(led_yellow).turn_off();
          id(led_green).turn_off();

          if (id(mode_code) == 3) {  // Warning Blink
            if (id(blink_state)) id(led_yellow).turn_on();
          } else if (id(mode_code) == 5 || id(mode_code) == 6) {  // Alarm Blink Slow/Fast
            if (id(blink_state)) id(led_red).turn_on();
          }

text_sensor:
  - platform: template
    name: "Tower Effective State"
    update_interval: 1s
    lambda: |-
      if (id(heartbeat_fault_active)) {
        return {"HeartbeatLost"};
      }

      switch (id(mode_code)) {
        case 0: return {"Off"};
        case 1: return {"Normal"};
        case 2: return {"Warning"};
        case 3: return {"WarningBlink"};
        case 4: return {"Alarm"};
        case 5: return {"AlarmBlinkSlow"};
        case 6: return {"AlarmBlinkFast"};
        default: return {"Unknown"};
      }