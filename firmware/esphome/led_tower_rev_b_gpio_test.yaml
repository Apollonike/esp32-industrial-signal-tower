esphome:
  name: led-tower-01
  friendly_name: led-tower-01

  on_boot:
    priority: -100
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - output.turn_on: led_red
            - delay: 10s
            - output.turn_off: led_red

            - output.turn_on: led_yellow
            - delay: 5s
            - output.turn_off: led_yellow

            - output.turn_on: led_green
            - delay: 1s
            - output.turn_off: led_green

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Led-Tower-01 Fallback Hotspot"
    password: !secret wifi_ap_password

captive_portal:
    
output:
  - platform: gpio
    pin: GPIO10
    id: led_red

  - platform: gpio
    pin: GPIO21
    id: led_yellow

  - platform: gpio
    pin: GPIO20
    id: led_green