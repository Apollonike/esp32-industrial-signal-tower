esphome:
  name: led-tower-01
  friendly_name: led-tower-01

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: W5500
  clk_pin: GPIO4
  miso_pin: GPIO5
  mosi_pin: GPIO6
  cs_pin: GPIO7
  interrupt_pin: GPIO3
  reset_pin: GPIO2

output:
  - platform: gpio
    pin: GPIO10
    id: led_red

  - platform: gpio
    pin: GPIO21
    id: led_yellow

  - platform: gpio
    pin: GPIO20
    id: led_green